<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Modo Compass · Journey Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF8;--cream:#F7F6F2;--paper:#FFFFFF;
  --brand:#c8102e;--brand-d:#a60d26;--brand-deep:#a60d26;--brand-light:#fdecef;
  --ink:#1B1D28;--ink-muted:#5A5E6C;--line:#E2E0D8;
  --name:#1B1D28;--sub:#5A5E6C;--body:#5A5E6C;--soft:#8B909E;--meta:#717784;
  --white:#ffffff;--weak:#FAFAF8;--dark:#1B1D28;
  --stroke:#E2E0D8;--stroke-soft:#ECEAE4;
  --green:#1a9d55;--green-d:#178c4e;--blue:#335cff;
  --shadow-sm:0 1px 2px rgba(27,29,40,.04);
  --shadow:0 1px 3px rgba(27,29,40,.05),0 8px 28px rgba(27,29,40,.07);
  --radius:14px;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-size:16px}
body{font-family:'DM Sans',system-ui,sans-serif;color:var(--body);line-height:1.6;min-height:100vh;background:var(--bg);font-size:15px}
.wrap{min-height:100vh;width:100%}
.shell{width:100%;max-width:none;padding:40px 52px 64px}

.shell-head{display:flex;align-items:center;justify-content:space-between;gap:24px;margin-bottom:20px}
.shell-head .nav-bar{margin-bottom:0;flex:1;min-width:0}
.lang-switch{
  display:inline-flex;flex-shrink:0;align-items:center;gap:3px;
  padding:4px;border-radius:12px;
  border:1px solid var(--stroke);
  background:linear-gradient(180deg,#fff 0%,var(--cream) 100%);
  box-shadow:var(--shadow-sm),0 4px 14px rgba(27,29,40,.04);
}
.lang-switch button{
  position:relative;padding:9px 20px;border:none;border-radius:9px;background:transparent;
  font-family:inherit;font-size:13px;font-weight:600;letter-spacing:.01em;
  color:var(--ink-muted);cursor:pointer;white-space:nowrap;
  transition:color .2s,background .2s,box-shadow .2s,transform .15s;
}
.lang-switch button:hover:not([aria-pressed="true"]){
  color:var(--ink);background:rgba(255,255,255,.85);
}
.lang-switch button[aria-pressed="true"]{
  background:var(--brand);color:#fff;
  box-shadow:0 2px 10px rgba(200,16,46,.32),0 1px 2px rgba(200,16,46,.18);
}
.lang-switch button[aria-pressed="true"]:hover{background:var(--brand-d)}
.lang-switch button:active:not([aria-pressed="true"]){transform:scale(.98)}
.lang-switch button:focus-visible{outline:2px solid var(--brand);outline-offset:2px}

.nav-bar{margin-bottom:20px}
.journey-picker{
  display:flex;gap:0;width:100%;max-width:640px;
  border:1px solid var(--line);background:var(--paper);
}
.jtab{
  flex:1;text-align:left;padding:8px 20px;border-radius:0;
  border:none;border-right:1px solid var(--line);
  background:transparent;cursor:pointer;
  transition:background .15s,color .15s;
  box-shadow:none;
}
.jtab:last-child{border-right:none}
.jtab:hover:not([aria-selected="true"]){background:var(--cream)}
.jtab[aria-selected="true"]{
  background:var(--ink);box-shadow:none;
}
.jtab .j-num{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--brand);margin-bottom:2px;display:block}
.jtab .tab-title{display:block;font-size:12px;font-weight:600;color:var(--ink);letter-spacing:-.01em;line-height:1.2}
.jtab .tab-sub{display:block;font-size:10px;font-weight:500;color:var(--ink-muted);margin-top:1px;line-height:1.3}
.jtab[aria-selected="true"] .j-num{color:rgba(255,255,255,.65)}
.jtab[aria-selected="true"] .tab-title{color:#fff}
.jtab[aria-selected="true"] .tab-sub{color:rgba(255,255,255,.55)}
.jtab:focus-visible{outline:2px solid var(--brand);outline-offset:-2px}

.demo-canvas{
  background:var(--paper);border:1px solid var(--line);border-radius:20px;
  box-shadow:var(--shadow);overflow:hidden;
}
.demo-inner{padding:40px 48px 44px}

/* stage layout */
.stage{display:grid;grid-template-columns:420px 1fr;gap:40px;align-items:start}
@media(max-width:1000px){.stage{grid-template-columns:1fr}}

.scenario{
  font-size:15px;color:var(--body);margin:0 0 16px 2px;
  display:flex;align-items:center;gap:10px;
}
.scenario .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(26,157,85,.15)}
.scenario b{color:var(--name);font-weight:600}

.phone-col{position:relative}
.phone{background:var(--dark);border-radius:44px;padding:13px;box-shadow:var(--shadow);width:100%;max-width:420px;margin:0 auto}
.screen{background:var(--weak);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;height:700px;position:relative}
.statusbar{display:flex;justify-content:space-between;align-items:center;padding:11px 22px 5px;font-family:var(--mono);font-size:13px;font-weight:500;color:var(--name);background:var(--white)}
.statusbar .r{display:flex;gap:5px;align-items:center;font-size:11px}
.chat-head{display:flex;flex-direction:column;align-items:center;gap:1px;padding:9px 14px 12px;background:var(--white);border-bottom:1px solid var(--stroke-soft)}
.sms-id{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--name);letter-spacing:.06em}
.thread{flex:1;overflow-y:auto;padding:16px 15px 10px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth;background:var(--weak)}
.thread::-webkit-scrollbar{width:0}
.row{display:flex;margin-top:10px;animation:pop .3s cubic-bezier(.2,.8,.3,1)}
.row.ai{justify-content:flex-start}
.row.member{justify-content:flex-end}
.row.system{justify-content:center}
@keyframes pop{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.bub{max-width:82%;padding:12px 16px;font-size:15px;line-height:1.5;white-space:pre-line;border-radius:18px;position:relative}
.ai .bub{background:var(--white);color:var(--name);border:1px solid var(--stroke);border-bottom-left-radius:5px}
.member .bub{background:var(--brand);color:#fff;border-bottom-right-radius:5px}
.system .bub{background:transparent;color:var(--soft);font-family:var(--mono);font-size:10px;font-weight:500;text-align:center;max-width:92%;padding:3px 10px}
.system .bub.alert{background:#feebed;color:#c8102e;border-radius:6px;padding:5px 11px}
.system .bub.good{background:#e0faec;color:#178c4e;border-radius:6px;padding:5px 11px}
/* inline tappable link inside an SMS message */
.msglink{color:var(--blue);text-decoration:underline;text-underline-offset:2px;cursor:pointer;font-weight:500;word-break:break-word}
.msglink:hover{color:#1f3bad}
.linkcard{margin-top:10px;background:var(--white);border:1px solid var(--stroke);border-radius:12px;padding:11px 14px;font-size:13px;font-weight:600;color:var(--brand);display:flex;align-items:center;gap:8px}
.linkcard::after{content:"→";margin-left:auto;font-size:15px}
.typing .bub{background:var(--white);border:1px solid var(--stroke);border-bottom-left-radius:5px;padding:12px 14px}
.typing span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#c4c4c4;margin:0 2px;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
/* phone footer */
.pfoot{padding:11px 14px 15px;background:var(--white);border-top:1px solid var(--stroke-soft);min-height:60px}
.fakebar{display:flex;align-items:center;gap:8px;background:var(--weak);border:1px solid var(--stroke);border-radius:22px;padding:10px 10px 10px 16px;color:var(--soft);font-size:14px}
.fakebar .send{margin-left:auto;width:26px;height:26px;border-radius:50%;background:var(--stroke);display:grid;place-items:center;color:#fff;font-size:12px}

/* Mariana Tek pop-up — opens on top of the whole demo */
.mt-overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(26,8,8,.55);opacity:0;visibility:hidden;transition:opacity .2s ease}
.mt-overlay.open{opacity:1;visibility:visible}
.mt-modal{width:100%;max-width:440px;max-height:88vh;background:var(--white);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 70px -20px rgba(0,0,0,.55);transform:translateY(12px) scale(.985);transition:transform .25s ease}
.mt-overlay.open .mt-modal{transform:none}
.mt-top{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--stroke-soft);flex-shrink:0}
.mt-brand{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--name)}
.mt-logo{display:block;flex-shrink:0}
.mt-pw{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--soft);text-transform:uppercase;letter-spacing:.05em}
.mt-close{width:27px;height:27px;border-radius:7px;border:1px solid var(--stroke);background:var(--white);color:var(--body);font-size:13px;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:.15s}
.mt-close:hover{background:var(--weak);color:var(--name)}
.mt-body{flex:1;overflow-y:auto;padding:18px 16px}
.mt-h{font-size:18px;font-weight:700;color:var(--name);letter-spacing:-.01em}
.mt-date{font-size:12px;color:var(--soft);margin-bottom:14px}
.mt-slot{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid var(--stroke);border-radius:10px;margin-bottom:9px}
.mt-time{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--name);width:64px;flex-shrink:0}
.mt-info{flex:1;min-width:0}
.mt-cls{font-size:13.5px;font-weight:600;color:var(--name)}
.mt-meta{font-size:11.5px;color:var(--soft);margin-top:2px}
.mt-reserve{font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;background:var(--brand);color:#fff;border:none;padding:9px 16px;border-radius:8px;flex-shrink:0;transition:.15s}
.mt-reserve:hover{background:var(--brand-d)}
.mt-plan{border:1px solid var(--stroke);border-radius:12px;padding:18px;margin-bottom:14px}
.mt-plan-name{font-size:15px;font-weight:700;color:var(--name)}
.mt-plan-price{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--name);margin:4px 0 12px}
.mt-plan-price span{font-size:14px;font-weight:400;color:var(--soft)}
.mt-perks{list-style:none;display:flex;flex-direction:column;gap:8px}
.mt-perks li{font-size:12.5px;color:var(--body);padding-left:21px;position:relative}
.mt-perks li::before{content:"✓";position:absolute;left:0;color:var(--green-d);font-weight:700}
.mt-card{font-family:var(--mono);font-size:13px;color:var(--meta);background:var(--weak);border:1px solid var(--stroke);border-radius:8px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.mt-pay{width:100%;padding:13px}
.mt-foot{padding:11px 16px;border-top:1px solid var(--stroke-soft);font-family:var(--mono);font-size:9px;color:var(--soft);text-align:center;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}

/* behind panel */
.behind{background:var(--cream);border:1px solid var(--stroke);border-radius:16px;padding:0;overflow:hidden;min-height:700px;display:flex;flex-direction:column}
.compass-bar{display:flex;align-items:center;gap:11px;padding:16px 24px;border-bottom:1px solid var(--stroke-soft);background:var(--paper)}
.compass-bar .cmark{width:28px;height:28px;display:grid;place-items:center;flex-shrink:0;line-height:0}
.compass-bar .cname{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--name);letter-spacing:-.01em}
.behind-top{padding:18px 24px 16px;border-bottom:1px solid var(--stroke-soft);background:var(--paper)}
.behind-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);font-weight:600}
.behind-step{font-family:'Fraunces',serif;font-size:22px;font-weight:600;letter-spacing:-.02em;color:var(--name);margin-top:8px;line-height:1.25}
.behind-body{padding:22px 26px;display:flex;flex-direction:column;gap:20px;flex:1}
.bsec .lab{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--soft);font-weight:600;margin-bottom:6px}
.bsec .val{font-size:15px;color:var(--body);line-height:1.6}
.bsec .val code{font-family:var(--mono);font-size:12px;background:var(--weak);color:var(--meta);border:1px solid var(--stroke-soft);padding:2px 7px;border-radius:5px;display:inline-block;margin:2px 4px 0 0}
.prod{margin-top:auto;background:var(--weak);border:1px solid var(--stroke);border-left:3px solid var(--brand);border-radius:8px;padding:12px 15px}
.prod .lab{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--brand);font-weight:700;margin-bottom:5px}
.prod .val{font-size:12.5px;color:var(--body);line-height:1.5}
.prod .val b{color:var(--name);font-weight:700}
/* ops card */
.opscard{background:var(--weak);border:1px solid var(--stroke);border-radius:10px;padding:13px 15px;margin-bottom:2px}
.opscard-h{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--meta);font-weight:600;margin-bottom:10px}
.briefrow{display:flex;gap:10px;align-items:center;margin-bottom:9px}
.briefrow .av{width:34px;height:34px;border-radius:50%;background:#fbe3e7;color:var(--brand);display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0}
.bn{font-size:13px;font-weight:600;color:var(--name)}
.bn .tag{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:#fbe3e7;color:var(--brand);padding:2px 6px;border-radius:6px;margin-left:6px;vertical-align:middle}
.bd{font-family:var(--mono);font-size:10.5px;color:var(--soft);margin-top:2px}
.brief-line{font-size:11.5px;color:var(--body);padding:4px 0;border-top:1px solid var(--stroke-soft)}
.brief-line b{color:var(--name);font-weight:600}
.brief-script{font-size:11.5px;font-style:italic;color:var(--body);background:var(--white);border:1px solid var(--stroke-soft);border-radius:8px;padding:9px 11px;margin-top:8px;line-height:1.5}
.convtbl{width:100%;border-collapse:collapse;font-size:11.5px}
.convtbl td{padding:6px 4px;border-bottom:1px solid var(--stroke-soft);vertical-align:top}
.convtbl tr:last-child td{border-bottom:none}
.convtbl td:first-child{color:var(--soft);width:44%}
.convtbl td:last-child{font-weight:600;color:var(--name);text-align:right;font-family:var(--mono)}

/* controls — bottom-right of behind panel */
.behind-footer{
  margin-top:auto;padding:14px 20px;border-top:1px solid var(--stroke-soft);
  background:var(--paper);display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.behind-nav{display:flex;align-items:center;justify-content:flex-end;gap:12px;margin-left:auto;flex-wrap:wrap}
.controls{display:flex;align-items:center;gap:12px}
.navbtn{
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
  border:1px solid var(--line);background:var(--paper);color:var(--body);
  padding:8px 16px;border-radius:0;transition:.15s;letter-spacing:-.01em;
}
.navbtn:hover:not(:disabled){border-color:#c8c4ba;color:var(--name);background:var(--cream)}
.navbtn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.navbtn.primary:hover:not(:disabled){background:var(--brand-d);border-color:var(--brand-d)}
.navbtn:disabled{opacity:.4;cursor:default}
.dot-step{
  width:26px;height:26px;border-radius:50%;border:1px solid var(--line);
  background:var(--cream);cursor:pointer;transition:.15s;padding:0;
  font-family:inherit;font-size:11px;font-weight:700;color:var(--ink-muted);
  display:grid;place-items:center;flex-shrink:0;
}
.dot-step.done{background:#e8a0ad;border-color:#e8a0ad;color:#fff}
.dot-step.active{background:var(--brand);border-color:var(--brand);color:#fff;transform:scale(1.08)}
.dots{display:flex;gap:6px;align-items:center}
.stepmeta{font-size:12px;color:var(--soft);white-space:nowrap}
.stepmeta b{color:var(--name);font-weight:600}
.restart{font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;background:transparent;border:none;color:var(--soft);text-decoration:underline;text-underline-offset:2px;margin-left:6px}
</style>
</head>

<div class="wrap">
<div class="shell">

  <div class="shell-head">
  <nav class="nav-bar">
    <div class="journey-picker" role="tablist">
      <button class="jtab" role="tab" aria-selected="true" data-j="j1">
        <span class="j-num" id="j1-num">Journey 01</span>
        <span class="tab-title" id="j1-title">New Lead</span>
        <span class="tab-sub" id="j1-sub">First class booking flow</span>
      </button>
      <button class="jtab" role="tab" aria-selected="false" data-j="j2">
        <span class="j-num" id="j2-num">Journey 02</span>
        <span class="tab-title" id="j2-title">Membership</span>
        <span class="tab-sub" id="j2-sub">Intro to unlimited conversion</span>
      </button>
    </div>
  </nav>
  <div class="lang-switch" role="group" aria-label="Language">
    <button type="button" class="lang-btn" data-lang="en" aria-pressed="true">English</button>
    <button type="button" class="lang-btn" data-lang="fr" aria-pressed="false">Français</button>
  </div>
  </div>

  <div class="demo-canvas">
  <div class="demo-inner">
  <div class="stage">
    <div class="phone-col">
      <div class="scenario"><span class="dot"></span><span id="scenario"></span></div>
      <div class="phone">
        <div class="screen">
          <div class="statusbar"><span id="clock">7:02</span><span class="r">5G &nbsp; <span style="font-weight:800">100%</span> ▰</span></div>
          <div class="chat-head"><div class="sms-id">SMS</div></div>
          <div class="thread" id="thread"></div>
          <div class="pfoot" id="pfoot"></div>
        </div>
      </div>
    </div>

    <div class="behind">
      <div class="compass-bar">
        <span class="cmark"><svg width="24" height="24"><use href="#modo-mark"></use></svg></span>
        <span class="cname">Modo Compass</span>
      </div>
      <div class="behind-top">
        <div class="behind-eyebrow"><span id="eyebrow">Behind the scenes</span></div>
        <div class="behind-step" id="stepName"></div>
      </div>
      <div class="behind-body" id="behindBody"></div>
      <div class="behind-footer">
        <button class="navbtn" id="prevBtn">‹ Back</button>
        <div class="behind-nav">
          <div class="stepmeta"><span id="stepMeta"></span> <button class="restart" id="restartBtn">restart</button></div>
          <div class="dots" id="dots"></div>
          <button class="navbtn primary" id="nextBtn">Next ›</button>
        </div>
      </div>
    </div>
  </div>

  </div>
  </div>

</div>
</div>

<div class="mt-overlay" id="mt" aria-hidden="true"><div class="mt-modal" id="mtModal"></div></div>

<script src="studio-demo-data.en.js"></script>
<script src="studio-demo-data.fr.js"></script>
<script>
/* ───────────────── localization ───────────────── */
const UI = {
  en: {
    behindScenes: 'Behind the scenes',
    triggerLabel: 'What starts it',
    doesLabel: 'What Compass does',
    stepEyebrow: (i, total) => `Step ${i} of ${total}`,
    stepMeta: (i, total, name) => `Step <b>${i}</b> of ${total} · ${name}`,
    stepAria: (i) => `Step ${i}`,
    back: '‹ Back',
    next: 'Next ›',
    complete: 'Journey complete ✓',
    restart: 'restart',
    textMessage: 'Text message',
    close: 'Close',
    reserve: 'Reserve',
    poweredBy: 'Powered by Mariana Tek',
    confirmPay: (price) => `Confirm & pay ${price}`,
    secureCheckout: 'Secure checkout · Mariana Tek',
    j1: { num: 'Journey 01', title: 'New Lead', sub: 'First class booking flow' },
    j2: { num: 'Journey 02', title: 'Membership', sub: 'Intro to unlimited conversion' },
  },
  fr: {
    behindScenes: 'Dans les coulisses',
    triggerLabel: 'Élément déclencheur',
    doesLabel: 'Ce que fait Compass',
    stepEyebrow: (i, total) => `Étape ${i} sur ${total}`,
    stepMeta: (i, total, name) => `Étape <b>${i}</b> sur ${total} · ${name}`,
    stepAria: (i) => `Étape ${i}`,
    back: '‹ Retour',
    next: 'Suivant ›',
    complete: 'Parcours terminé ✓',
    restart: 'recommencer',
    textMessage: 'Message texte',
    close: 'Fermer',
    reserve: 'Réserver',
    poweredBy: 'Propulsé par Mariana Tek',
    confirmPay: (price) => `Confirmer et payer ${price}`,
    secureCheckout: 'Paiement sécurisé · Mariana Tek',
    j1: { num: 'Parcours 1', title: 'Nouveau prospect', sub: 'Premier cours' },
    j2: { num: 'Parcours 2', title: 'Conversion en abonnement', sub: 'Intro vers illimité' },
  },
};

let lang = localStorage.getItem('studioDemoLang') || 'en';
function ui() { return UI[lang]; }
function data() { return lang === 'fr' ? STUDIO_DEMO_DATA_FR : STUDIO_DEMO_DATA_EN; }

function applyUiStrings() {
  const u = ui();
  document.documentElement.lang = lang;
  ['j1', 'j2'].forEach((k) => {
    $(k + '-num').textContent = u[k].num;
    $(k + '-title').textContent = u[k].title;
    $(k + '-sub').textContent = u[k].sub;
  });
  $('prevBtn').textContent = u.back;
  $('restartBtn').textContent = u.restart;
  document.querySelectorAll('.lang-btn').forEach((b) => {
    b.setAttribute('aria-pressed', b.dataset.lang === lang ? 'true' : 'false');
  });
}

function setLang(next) {
  if (next === lang) return;
  lang = next;
  localStorage.setItem('studioDemoLang', next);
  applyUiStrings();
  startJourney(jk);
}

/* ───────────────── engine ───────────────── */
const $ = id => document.getElementById(id);
const thread=$("thread"), pfoot=$("pfoot"), behindBody=$("behindBody"), mtEl=$("mt"), mtModal=$("mtModal");
let jk="j1", idx=0, busy=false, awaiting=false;
const chosen={};
const ckey=(j,i)=>j+":"+i;

function rowEl(ev){
  const row=document.createElement("div");
  row.className="row "+ev.from;
  const bub=document.createElement("div");
  bub.className="bub"+(ev.from==="system"&&ev.style?(" "+ev.style):"");
  bub.appendChild(document.createTextNode(ev.text));
  if(ev.mtlink){
    bub.appendChild(document.createTextNode(" "));
    const a=document.createElement("span"); a.className="msglink"; a.textContent=ev.mtlink; a.dataset.mt="1";
    bub.appendChild(a);
  }
  if(ev.link){ const lc=document.createElement("div"); lc.className="linkcard"; lc.textContent=ev.link; bub.appendChild(lc); }
  row.appendChild(bub);
  return row;
}
function scrollDown(){ thread.scrollTop=thread.scrollHeight; }
const wait=ms=>new Promise(r=>setTimeout(r,ms));

async function addMsg(ev, animate){
  if(ev.from==="ai" && animate){
    const t=document.createElement("div"); t.className="row ai typing";
    t.innerHTML='<div class="bub"><span></span><span></span><span></span></div>';
    thread.appendChild(t); scrollDown(); await wait(620); t.remove();
  }
  thread.appendChild(rowEl(ev)); scrollDown();
  if(animate) await wait(ev.from==="ai"?240:200);
}

function fakeBar(){
  pfoot.innerHTML='<div class="fakebar">'+ui().textMessage+'<div class="send">↑</div></div>';
}

function bookHTML(mt){
  const u=ui();
  return '<div class="mt-top">'+
    '<div class="mt-brand"><svg class="mt-logo" width="21" height="21"><use href="#modo-mark"></use></svg> Modo Yoga</div>'+
    '<span class="mt-pw">Mariana Tek</span>'+
    '<button class="mt-close" type="button" aria-label="'+u.close+'">✕</button></div>'+
    '<div class="mt-body"><div class="mt-h">'+mt.title+'</div><div class="mt-date">'+mt.date+'</div>'+
    mt.slots.map((s,i)=>'<div class="mt-slot"><div class="mt-time">'+s.time+'</div>'+
      '<div class="mt-info"><div class="mt-cls">'+s.cls+'</div><div class="mt-meta">'+s.who+' · '+s.spots+'</div></div>'+
      '<button class="mt-reserve" type="button" data-slot="'+i+'">'+u.reserve+'</button></div>').join("")+
    '</div><div class="mt-foot">'+u.poweredBy+'</div>';
}
function checkoutHTML(mt){
  const u=ui();
  return '<div class="mt-top">'+
    '<div class="mt-brand"><svg class="mt-logo" width="21" height="21"><use href="#modo-mark"></use></svg> Modo Yoga</div>'+
    '<span class="mt-pw">Mariana Tek</span>'+
    '<button class="mt-close" type="button" aria-label="'+u.close+'">✕</button></div>'+
    '<div class="mt-body"><div class="mt-h">'+mt.title+'</div><div class="mt-date">Modo Yoga · Modo Mondo</div>'+
    '<div class="mt-plan"><div class="mt-plan-name">'+mt.plan.name+'</div>'+
    '<div class="mt-plan-price">'+mt.plan.price+'<span>'+mt.plan.per+'</span></div>'+
    '<ul class="mt-perks">'+mt.plan.perks.map(p=>'<li>'+p+'</li>').join("")+'</ul></div>'+
    '<div class="mt-card">💳 ···· ···· ···· 4242</div>'+
    '<button class="mt-reserve mt-pay" type="button" data-slot="0">'+u.confirmPay(mt.plan.price)+'</button>'+
    '</div><div class="mt-foot">'+u.secureCheckout+'</div>';
}

function openMT(i){
  if(busy || i!==idx || !awaiting) return;
  const mt=data()[jk].scenes[i].mt;
  mtModal.innerHTML = mt.kind==="checkout" ? checkoutHTML(mt) : bookHTML(mt);
  mtEl.classList.add("open"); mtEl.setAttribute("aria-hidden","false");
  mtModal.querySelector(".mt-close").onclick=closeMT;
  mtModal.querySelectorAll("[data-slot]").forEach(b=> b.onclick=()=>bookMT(i, +b.dataset.slot));
}
function closeMT(){ mtEl.classList.remove("open"); mtEl.setAttribute("aria-hidden","true"); }

async function bookMT(i, slotIdx){
  if(busy) return;
  closeMT();
  chosen[ckey(jk,i)]=slotIdx; awaiting=false; busy=true; updateControls();
  const mt=data()[jk].scenes[i].mt;
  try {
    const confirm = mt.kind==="checkout" ? mt.confirm : mt.slots[slotIdx].confirm;
    for(const ev of confirm) await addMsg(ev, true);
  } finally { busy=false; fakeBar(); updateControls(); }
}

async function renderScene(i, animate){
  const s=data()[jk].scenes[i];
  for(const ev of s.pre) await addMsg(ev, animate);
  if(s.mt){
    const links=thread.querySelectorAll(".ai .msglink");
    const a=links[links.length-1]; if(a) a.onclick=()=>openMT(i);
    if(animate){ awaiting=true; return; }
    const oi=chosen[ckey(jk,i)]??0;
    const confirm = s.mt.kind==="checkout" ? s.mt.confirm : s.mt.slots[oi].confirm;
    for(const ev of confirm) await addMsg(ev, false);
  }
}

function updateBehind(i){
  const u=ui(), d=data()[jk], s=d.scenes[i], b=s.behind;
  $("eyebrow").textContent=u.stepEyebrow(i+1, d.scenes.length);
  $("stepName").textContent=s.step;
  let html="";
  if(s.ops) html+=s.ops;
  html+=`<div class="bsec"><div class="lab">${u.triggerLabel}</div><div class="val">${b.trigger}</div></div>`;
  html+=`<div class="bsec"><div class="lab">${u.doesLabel}</div><div class="val">${b.does}</div></div>`;
  behindBody.innerHTML=html;
}

function setStep(i){
  idx=i;
  updateBehind(i);
  updateDots();
  updateControls();
}

function buildDots(){
  const u=ui(), dots=$("dots"); dots.innerHTML="";
  data()[jk].scenes.forEach((s,i)=>{
    const d=document.createElement("button");
    d.type="button";
    d.className="dot-step";
    d.textContent=String(i+1);
    d.dataset.step=String(i);
    d.setAttribute("aria-label", u.stepAria(i+1));
    d.onclick=()=>jumpTo(i);
    dots.appendChild(d);
  });
  updateDots();
}
function updateDots(){
  [...$("dots").children].forEach((d,i)=>{
    d.classList.remove("done","active");
    if(i<idx) d.classList.add("done");
    else if(i===idx) d.classList.add("active");
  });
}
function updateControls(){
  const u=ui(), d=data()[jk];
  $("prevBtn").disabled = busy || idx===0;
  $("nextBtn").disabled = busy || awaiting || idx>=d.scenes.length-1;
  $("stepMeta").innerHTML = u.stepMeta(idx+1, d.scenes.length, d.scenes[idx].step);
  $("nextBtn").textContent = idx>=d.scenes.length-1 ? u.complete : u.next;
  updateDots();
}

async function gotoScene(i, animate){
  if(i<0||i>=data()[jk].scenes.length) return;
  busy=true; awaiting=false; closeMT();
  setStep(i);
  try { await renderScene(i, animate); }
  finally { busy=false; if(!awaiting) fakeBar(); updateControls(); }
}
async function next(){
  if(busy||awaiting||idx>=data()[jk].scenes.length-1) return;
  await gotoScene(idx+1, true);
}
async function jumpTo(target){
  if(busy||target===idx) return;
  busy=true; awaiting=false; closeMT();
  thread.innerHTML=""; pfoot.innerHTML="";
  updateControls();
  try {
    for(let k=0;k<target;k++) await renderScene(k, false);
    setStep(target);
    await renderScene(target, true);
  } finally { busy=false; if(!awaiting) fakeBar(); updateControls(); }
}
function prev(){ if(!busy && idx>0) jumpTo(idx-1); }

async function startJourney(key){
  jk=key; busy=true; awaiting=false; closeMT();
  const d=data()[key];
  document.querySelectorAll(".jtab").forEach(t=>t.setAttribute("aria-selected", t.dataset.j===key));
  $("scenario").innerHTML=d.scenario;
  $("clock").textContent=d.clock;
  thread.innerHTML=""; pfoot.innerHTML=""; behindBody.innerHTML="";
  buildDots();
  setStep(0);
  await gotoScene(0, true);
}

/* wiring */
$("nextBtn").onclick=next;
$("prevBtn").onclick=prev;
$("restartBtn").onclick=()=>startJourney(jk);
mtEl.onclick=e=>{ if(e.target===mtEl) closeMT(); };
document.querySelectorAll(".jtab").forEach(t=>t.onclick=()=>startJourney(t.dataset.j));
document.querySelectorAll(".lang-btn").forEach(b=>b.onclick=()=>setLang(b.dataset.lang));
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ closeMT(); return; }
  if(e.key==="ArrowRight"){ e.preventDefault(); next(); }
  if(e.key==="ArrowLeft"){ e.preventDefault(); prev(); }
});

applyUiStrings();
startJourney("j1");
</script>
</body>
</html>
