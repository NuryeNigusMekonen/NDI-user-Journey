<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Modo Compass · Démo du parcours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#C41F3A;--brand-d:#A60D24;--brand-active:#A60D24;
  --ink:#1A0808;--name:#1A0808;--sub:#5c5c5c;--body:#525866;--soft:#a3a3a3;--meta:#717784;
  --white:#ffffff;--weak:#f7f7f7;--dark:#1A0808;
  --stroke:#e1e4ea;--stroke-soft:#ebebeb;
  --green:#1fc16b;--green-d:#178c4e;--blue:#335cff;
  --shadow-sm:0 1px 2px rgba(26,8,8,.05);
  --shadow:0 2px 4px rgba(26,8,8,.05),0 14px 30px -18px rgba(26,8,8,.22);
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;color:var(--body);line-height:1.5;min-height:100vh;background:var(--weak);padding:24px 20px 44px}
.wrap{max-width:1160px;margin:0 auto}

/* masthead */
.masthead{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.brand{display:flex;align-items:center;gap:11px}
.brand .logo{width:38px;height:38px;flex-shrink:0;display:block;line-height:0}
.brand h1{font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--name);line-height:1.05}
.brand .sub{font-size:11px;color:var(--soft);font-weight:500;margin-top:3px}
.masthead-meta{font-family:var(--mono);font-size:11px;color:var(--meta);text-align:right;line-height:1.6}
.masthead-meta b{color:var(--body);font-weight:500}

/* journey tabs */
.jtabs{display:flex;gap:2px;border-bottom:1px solid var(--stroke);margin-bottom:20px}
.jtab{position:relative;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--body);padding:11px 16px 13px;text-align:left;transition:color .15s}
.jtab:hover{color:var(--name)}
.jtab small{display:block;font-size:11px;font-weight:400;color:var(--soft);margin-top:3px}
.jtab[aria-selected="true"]{font-weight:600;color:var(--name)}
.jtab[aria-selected="true"] small{color:var(--sub)}
.jtab[aria-selected="true"]::after{content:"";position:absolute;left:16px;right:16px;bottom:-1px;height:2px;background:var(--brand);border-radius:2px 2px 0 0}

/* stage layout */
.stage{display:grid;grid-template-columns:372px 1fr;gap:20px;align-items:start}
@media(max-width:860px){.stage{grid-template-columns:1fr}}

/* scenario banner */
.scenario{font-size:12px;color:var(--body);margin:0 0 10px 2px;display:flex;align-items:center;gap:8px}
.scenario .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px #e0faec}
.scenario b{color:var(--name);font-weight:600}

/* phone */
.phone-col{position:relative}
.phone{background:var(--dark);border-radius:38px;padding:10px;box-shadow:var(--shadow);width:100%;max-width:372px;margin:0 auto}
.screen{background:var(--weak);border-radius:30px;overflow:hidden;display:flex;flex-direction:column;height:600px;position:relative}
.statusbar{display:flex;justify-content:space-between;align-items:center;padding:9px 20px 4px;font-family:var(--mono);font-size:12px;font-weight:500;color:var(--name);background:var(--white)}
.statusbar .r{display:flex;gap:5px;align-items:center;font-size:10px}
.chat-head{display:flex;flex-direction:column;align-items:center;gap:1px;padding:7px 12px 10px;background:var(--white);border-bottom:1px solid var(--stroke-soft)}
.sms-id{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--name);letter-spacing:.06em}
.thread{flex:1;overflow-y:auto;padding:14px 13px 8px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth;background:var(--weak)}
.thread::-webkit-scrollbar{width:0}
.row{display:flex;margin-top:8px;animation:pop .3s cubic-bezier(.2,.8,.3,1)}
.row.ai{justify-content:flex-start}
.row.member{justify-content:flex-end}
.row.system{justify-content:center}
@keyframes pop{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.bub{max-width:80%;padding:9px 13px;font-size:13px;line-height:1.45;white-space:pre-line;border-radius:16px;position:relative}
.ai .bub{background:var(--white);color:var(--name);border:1px solid var(--stroke);border-bottom-left-radius:5px}
.member .bub{background:var(--brand);color:#fff;border-bottom-right-radius:5px}
.system .bub{background:transparent;color:var(--soft);font-family:var(--mono);font-size:10px;font-weight:500;text-align:center;max-width:92%;padding:3px 10px}
.system .bub.alert{background:#feebed;color:#c8102e;border-radius:6px;padding:5px 11px}
.system .bub.good{background:#e0faec;color:#178c4e;border-radius:6px;padding:5px 11px}
/* inline tappable link inside an SMS message */
.msglink{color:var(--blue);text-decoration:underline;text-underline-offset:2px;cursor:pointer;font-weight:500;word-break:break-word}
.msglink:hover{color:#1f3bad}
.linkcard{margin-top:8px;background:var(--white);border:1px solid var(--stroke);border-radius:10px;padding:9px 12px;font-size:12px;font-weight:600;color:var(--brand);display:flex;align-items:center;gap:7px}
.linkcard::after{content:"→";margin-left:auto;font-size:14px}
.typing .bub{background:var(--white);border:1px solid var(--stroke);border-bottom-left-radius:5px;padding:12px 14px}
.typing span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#c4c4c4;margin:0 2px;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
/* phone footer */
.pfoot{padding:9px 12px 13px;background:var(--white);border-top:1px solid var(--stroke-soft);min-height:56px}
.fakebar{display:flex;align-items:center;gap:8px;background:var(--weak);border:1px solid var(--stroke);border-radius:20px;padding:8px 8px 8px 14px;color:var(--soft);font-size:13px}
.fakebar .send{margin-left:auto;width:26px;height:26px;border-radius:50%;background:var(--stroke);display:grid;place-items:center;color:#fff;font-size:12px}

/* Mariana Tek pop-up — opens on top of the whole demo */
.mt-overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(26,8,8,.55);opacity:0;visibility:hidden;transition:opacity .2s ease}
.mt-overlay.open{opacity:1;visibility:visible}
.mt-modal{width:100%;max-width:440px;max-height:88vh;background:var(--white);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 70px -20px rgba(0,0,0,.55);transform:translateY(12px) scale(.985);transition:transform .25s ease}
.mt-overlay.open .mt-modal{transform:none}
.mt-top{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--stroke-soft);flex-shrink:0}
.mt-brand{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--name)}
.mt-logo{display:block;flex-shrink:0}
.mt-pw{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--soft);text-transform:uppercase;letter-spacing:.05em}
.mt-close{width:27px;height:27px;border-radius:7px;border:1px solid var(--stroke);background:var(--white);color:var(--body);font-size:13px;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:.15s}
.mt-close:hover{background:var(--weak);color:var(--name)}
.mt-body{flex:1;overflow-y:auto;padding:18px 16px}
.mt-h{font-size:18px;font-weight:700;color:var(--name);letter-spacing:-.01em}
.mt-date{font-size:12px;color:var(--soft);margin-bottom:14px}
.mt-slot{display:flex;align-items:center;gap:12px;padding:13px;border:1px solid var(--stroke);border-radius:10px;margin-bottom:9px}
.mt-time{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--name);width:64px;flex-shrink:0}
.mt-info{flex:1;min-width:0}
.mt-cls{font-size:13.5px;font-weight:600;color:var(--name)}
.mt-meta{font-size:11.5px;color:var(--soft);margin-top:2px}
.mt-reserve{font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;background:var(--brand);color:#fff;border:none;padding:9px 16px;border-radius:8px;flex-shrink:0;transition:.15s}
.mt-reserve:hover{background:var(--brand-d)}
.mt-plan{border:1px solid var(--stroke);border-radius:12px;padding:18px;margin-bottom:14px}
.mt-plan-name{font-size:15px;font-weight:700;color:var(--name)}
.mt-plan-price{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--name);margin:4px 0 12px}
.mt-plan-price span{font-size:14px;font-weight:400;color:var(--soft)}
.mt-perks{list-style:none;display:flex;flex-direction:column;gap:8px}
.mt-perks li{font-size:12.5px;color:var(--body);padding-left:21px;position:relative}
.mt-perks li::before{content:"✓";position:absolute;left:0;color:var(--green-d);font-weight:700}
.mt-card{font-family:var(--mono);font-size:13px;color:var(--meta);background:var(--weak);border:1px solid var(--stroke);border-radius:8px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.mt-pay{width:100%;padding:13px}
.mt-foot{padding:11px 16px;border-top:1px solid var(--stroke-soft);font-family:var(--mono);font-size:9px;color:var(--soft);text-align:center;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}

/* behind panel */
.behind{background:var(--white);border:1px solid var(--stroke);border-radius:12px;box-shadow:var(--shadow-sm);padding:0;overflow:hidden;min-height:600px;display:flex;flex-direction:column}
.compass-bar{display:flex;align-items:center;gap:9px;padding:13px 20px;border-bottom:1px solid var(--stroke-soft);background:var(--white)}
.compass-bar .cmark{width:24px;height:24px;display:grid;place-items:center;flex-shrink:0;line-height:0}
.compass-bar .cname{font-size:15px;font-weight:700;color:var(--name);letter-spacing:-.01em}
.behind-top{padding:15px 20px 14px;border-bottom:1px solid var(--stroke-soft)}
.behind-eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--soft);font-weight:600}
.behind-step{font-size:18px;font-weight:700;letter-spacing:-.02em;color:var(--name);margin-top:6px}
.behind-body{padding:16px 20px;display:flex;flex-direction:column;gap:15px;flex:1}
.bsec .lab{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--soft);font-weight:600;margin-bottom:5px}
.bsec .val{font-size:13px;color:var(--body);line-height:1.55}
.bsec .val code{font-family:var(--mono);font-size:11px;background:var(--weak);color:var(--meta);border:1px solid var(--stroke-soft);padding:1px 6px;border-radius:4px;display:inline-block;margin:2px 3px 0 0}
.prod{margin-top:auto;background:var(--weak);border:1px solid var(--stroke);border-left:3px solid var(--brand);border-radius:8px;padding:12px 15px}
.prod .lab{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--brand);font-weight:700;margin-bottom:5px}
.prod .val{font-size:12.5px;color:var(--body);line-height:1.5}
.prod .val b{color:var(--name);font-weight:700}
/* ops card */
.opscard{background:var(--weak);border:1px solid var(--stroke);border-radius:10px;padding:13px 15px;margin-bottom:2px}
.opscard-h{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--meta);font-weight:600;margin-bottom:10px}
.briefrow{display:flex;gap:10px;align-items:center;margin-bottom:9px}
.briefrow .av{width:34px;height:34px;border-radius:50%;background:#fbe3e7;color:var(--brand);display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0}
.bn{font-size:13px;font-weight:600;color:var(--name)}
.bn .tag{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:#fbe3e7;color:var(--brand);padding:2px 6px;border-radius:6px;margin-left:6px;vertical-align:middle}
.bd{font-family:var(--mono);font-size:10.5px;color:var(--soft);margin-top:2px}
.brief-line{font-size:11.5px;color:var(--body);padding:4px 0;border-top:1px solid var(--stroke-soft)}
.brief-line b{color:var(--name);font-weight:600}
.brief-script{font-size:11.5px;font-style:italic;color:var(--body);background:var(--white);border:1px solid var(--stroke-soft);border-radius:8px;padding:9px 11px;margin-top:8px;line-height:1.5}
.convtbl{width:100%;border-collapse:collapse;font-size:11.5px}
.convtbl td{padding:6px 4px;border-bottom:1px solid var(--stroke-soft);vertical-align:top}
.convtbl tr:last-child td{border-bottom:none}
.convtbl td:first-child{color:var(--soft);width:44%}
.convtbl td:last-child{font-weight:600;color:var(--name);text-align:right;font-family:var(--mono)}

/* controls */
.controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:20px}
.navbtn{font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #cacfd8;background:var(--white);color:var(--body);padding:10px 18px;border-radius:8px;transition:.15s}
.navbtn:hover:not(:disabled){border-color:#b3b9c4;color:var(--name)}
.navbtn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.navbtn.primary:hover:not(:disabled){background:var(--brand-d);border-color:var(--brand-d)}
.navbtn:disabled{opacity:.45;cursor:default}
.dots{display:flex;gap:7px;align-items:center}
.dot-step{width:8px;height:8px;border-radius:50%;background:var(--stroke);border:none;cursor:pointer;transition:.15s;padding:0}
.dot-step.done{background:#e6a3ad}
.dot-step.active{background:var(--brand);transform:scale(1.35)}
.stepmeta{text-align:center;font-size:12px;color:var(--soft);margin-top:10px}
.stepmeta b{color:var(--name);font-weight:600}
.restart{font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;background:transparent;border:none;color:var(--soft);text-decoration:underline;text-underline-offset:2px;margin-left:4px}
.hint{text-align:center;font-size:11px;color:var(--soft);margin-top:14px}
</style>
</head>

<div class="wrap">

  <div class="masthead">
    <div class="brand">
      <div class="logo"><svg width="38" height="38"><use href="#modo-mark"></use></svg></div>
      <div><h1>Modo Compass</h1><div class="sub">Studio Lead Membership Engine · Démo du parcours</div></div>
    </div>
    <div class="masthead-meta"><div>Modo Yoga · Modo Mondo</div></div>
  </div>

  <div class="jtabs" role="tablist">
    <button class="jtab" role="tab" aria-selected="true" data-j="j1">Parcours 1<small>Nouveau prospect → Premier cours</small></button>
    <button class="jtab" role="tab" aria-selected="false" data-j="j2">Parcours 2<small>Conversion en abonnement</small></button>
  </div>

  <div class="stage">
    <div class="phone-col">
      <div class="scenario"><span class="dot"></span><span id="scenario"></span></div>
      <div class="phone">
        <div class="screen">
          <div class="statusbar"><span id="clock">07:02</span><span class="r">5G &nbsp; <span style="font-weight:800">100%</span> ▰</span></div>
          <div class="chat-head"><div class="sms-id">SMS</div></div>
          <div class="thread" id="thread"></div>
          <div class="pfoot" id="pfoot"></div>
        </div>
      </div>
    </div>

    <div class="behind">
      <div class="compass-bar">
        <span class="cmark"><svg width="24" height="24"><use href="#modo-mark"></use></svg></span>
        <span class="cname">Modo Compass</span>
      </div>
      <div class="behind-top">
        <div class="behind-eyebrow"><span id="eyebrow">Dans les coulisses</span></div>
        <div class="behind-step" id="stepName"></div>
      </div>
      <div class="behind-body" id="behindBody"></div>
    </div>
  </div>

  <div class="controls">
    <button class="navbtn" id="prevBtn">‹ Retour</button>
    <div class="dots" id="dots"></div>

<script>
/* ───────────────── contenu ───────────────── */
const DATA = {
  j1: {
    name: "Nouveau prospect → Premier cours",
    scenario: "<b>Sarah M.</b> · première visite, vient de découvrir Modo Yoga",
    clock: "07:02",
    scenes: [
      { step:"Bienvenue",
        pre:[
          {from:"system", text:"Sarah a créé un compte sur modoyoga.com"},
          {from:"ai", text:"Salut Sarah ! 👋 C'est Modo Yoga, ravis que tu nous aies trouvés. Qu'est-ce qui t'attire sur le tapis en ce moment, et y a-t-il quelque chose qui te retient ?"},
          {from:"member", text:"Salut ! Honnêtement, gérer le stress + la souplesse. Un peu nerveuse à l'idée de ne pas être assez souple 😅"},
          {from:"ai", text:"C'est la crainte la plus fréquente, et la moins fondée 🌿 La souplesse, c'est le cours qui te la donne, pas un prérequis. Tu es exactement au bon endroit."}
        ],
        behind:{ trigger:"Compte créé, Mariana Tek déclenche un webhook.",
          does:"Envoie un accueil chaleureux en quelques minutes et pose des questions sur les objectifs et les hésitations, pour tout personnaliser ensuite.",
          prod:"Les SMS transactionnels atteignent <b>97 %</b> des membres, contre seulement 7 % pour le marketing. L'accueil est classé transactionnel, il arrive donc vraiment à destination." } },

      { step:"Offre découverte personnalisée",
        pre:[
          {from:"ai", text:"Envie de commencer en douceur ? Notre offre découverte de 2 semaines, ce sont des cours illimités pour 40 $ CA, la meilleure façon de trouver ton rythme."},
          {from:"member", text:"Oui, avec plaisir !"},
          {from:"ai", text:"Génial 🙌 Voici ton paiement sécurisé, il s'ouvre directement dans Mariana Tek :", mtlink:"modoyoga.marianatek.com/intro"}

/* ───────────────── moteur ───────────────── */
const $ = id => document.getElementById(id);
const thread=$("thread"), pfoot=$("pfoot"), behindBody=$("behindBody"), mtEl=$("mt"), mtModal=$("mtModal");
let jk="j1", idx=0, busy=false, awaiting=false;
const chosen={};
const ckey=(j,i)=>j+":"+i;

function rowEl(ev){
  const row=document.createElement("div");
  row.className="row "+ev.from;
  const bub=document.createElement("div");
  bub.className="bub"+(ev.from==="system"&&ev.style?(" "+ev.style):"");
  bub.appendChild(document.createTextNode(ev.text));
  if(ev.mtlink){
    bub.appendChild(document.createTextNode(" "));
    const a=document.createElement("span"); a.className="msglink"; a.textContent=ev.mtlink; a.dataset.mt="1";
    bub.appendChild(a);
  }
  if(ev.link){ const lc=document.createElement("div"); lc.className="linkcard"; lc.textContent=ev.link; bub.appendChild(lc); }
  row.appendChild(bub);
  return row;
}
function scrollDown(){ thread.scrollTop=thread.scrollHeight; }
const wait=ms=>new Promise(r=>setTimeout(r,ms));

async function addMsg(ev, animate){
  if(ev.from==="ai" && animate){
    const t=document.createElement("div"); t.className="row ai typing";
    t.innerHTML='<div class="bub"><span></span><span></span><span></span></div>';
    thread.appendChild(t); scrollDown(); await wait(620); t.remove();
  }
  thread.appendChild(rowEl(ev)); scrollDown();
  if(animate) await wait(ev.from==="ai"?240:200);
}

function fakeBar(){
  pfoot.innerHTML='<div class="fakebar">Message texte<div class="send">↑</div></div>';
}

function bookHTML(mt){
  return '<div class="mt-top">'+
    '<div class="mt-brand"><svg class="mt-logo" width="21" height="21"><use href="#modo-mark"></use></svg> Modo Yoga</div>'+
    '<span class="mt-pw">Mariana Tek</span>'+
    '<button class="mt-close" type="button" aria-label="Fermer">✕</button></div>'+
    '<div class="mt-body"><div class="mt-h">'+mt.title+'</div><div class="mt-date">'+mt.date+'</div>'+
    mt.slots.map((s,i)=>'<div class="mt-slot"><div class="mt-time">'+s.time+'</div>'+
      '<div class="mt-info"><div class="mt-cls">'+s.cls+'</div><div class="mt-meta">'+s.who+' · '+s.spots+'</div></div>'+
      '<button class="mt-reserve" type="button" data-slot="'+i+'">Réserver</button></div>').join("")+
    '</div><div class="mt-foot">Propulsé par Mariana Tek</div>';
}
function checkoutHTML(mt){
  return '<div class="mt-top">'+
    '<div class="mt-brand"><svg class="mt-logo" width="21" height="21"><use href="#modo-mark"></use></svg> Modo Yoga</div>'+
    '<span class="mt-pw">Mariana Tek</span>'+
    '<button class="mt-close" type="button" aria-label="Fermer">✕</button></div>'+
    '<div class="mt-body"><div class="mt-h">'+mt.title+'</div><div class="mt-date">Modo Yoga · Modo Mondo</div>'+
    '<div class="mt-plan"><div class="mt-plan-name">'+mt.plan.name+'</div>'+
    '<div class="mt-plan-price">'+mt.plan.price+'<span>'+mt.plan.per+'</span></div>'+
    '<ul class="mt-perks">'+mt.plan.perks.map(p=>'<li>'+p+'</li>').join("")+'</ul></div>'+
    '<div class="mt-card">💳 ···· ···· ···· 4242</div>'+
    '<button class="mt-reserve mt-pay" type="button" data-slot="0">Confirmer et payer '+mt.plan.price+'</button>'+
    '</div><div class="mt-foot">Paiement sécurisé · Mariana Tek</div>';
}

function openMT(i){
  if(busy || i!==idx || !awaiting) return;
  const mt=DATA[jk].scenes[i].mt;
  mtModal.innerHTML = mt.kind==="checkout" ? checkoutHTML(mt) : bookHTML(mt);
  mtEl.classList.add("open"); mtEl.setAttribute("aria-hidden","false");
  mtModal.querySelector(".mt-close").onclick=closeMT;
  mtModal.querySelectorAll("[data-slot]").forEach(b=> b.onclick=()=>bookMT(i, +b.dataset.slot));
}
function closeMT(){ mtEl.classList.remove("open"); mtEl.setAttribute("aria-hidden","true"); }

async function bookMT(i, slotIdx){
  if(busy) return;
  closeMT();
  chosen[ckey(jk,i)]=slotIdx; awaiting=false; busy=true; updateControls();
  const mt=DATA[jk].scenes[i].mt;
  try {
    const confirm = mt.kind==="checkout" ? mt.confirm : mt.slots[slotIdx].confirm;
    for(const ev of confirm) await addMsg(ev, true);
  } finally { busy=false; fakeBar(); updateControls(); }
}

async function renderScene(i, animate){
  const s=DATA[jk].scenes[i];
  for(const ev of s.pre) await addMsg(ev, animate);
  if(s.mt){
    const links=thread.querySelectorAll(".ai .msglink");
    const a=links[links.length-1]; if(a) a.onclick=()=>openMT(i);
    if(animate){ awaiting=true; return; }
    const oi=chosen[ckey(jk,i)]??0;
    const confirm = s.mt.kind==="checkout" ? s.mt.confirm : s.mt.slots[oi].confirm;
    for(const ev of confirm) await addMsg(ev, false);
  }
}

function updateBehind(i){
  const s=DATA[jk].scenes[i], b=s.behind;
  $("eyebrow").textContent="Étape "+(i+1)+" sur "+DATA[jk].scenes.length;
  $("stepName").textContent=s.step;
  let html="";
  if(s.ops) html+=s.ops;
  html+=`<div class="bsec"><div class="lab">Élément déclencheur</div><div class="val">${b.trigger}</div></div>`;
  html+=`<div class="bsec"><div class="lab">Ce que fait Compass</div><div class="val">${b.does}</div></div>`;
  behindBody.innerHTML=html;
}

function buildDots(){
  const dots=$("dots"); dots.innerHTML="";
  DATA[jk].scenes.forEach((s,i)=>{
    const d=document.createElement("button"); d.className="dot-step"; d.setAttribute("aria-label","Étape "+(i+1));
    d.onclick=()=>jumpTo(i);
    dots.appendChild(d);
  });
}
function updateDots(){
  [...$("dots").children].forEach((d,i)=>{
    d.className="dot-step"+(i<idx?" done":"")+(i===idx?" active":"");
  });
}
function updateControls(){
  $("prevBtn").disabled = busy || idx===0;
  $("nextBtn").disabled = busy || awaiting || idx===DATA[jk].scenes.length-1;
  $("stepMeta").innerHTML = "Étape <b>"+(idx+1)+"</b> sur "+DATA[jk].scenes.length+" · "+DATA[jk].scenes[idx].step;
  $("nextBtn").textContent = idx===DATA[jk].scenes.length-1 ? "Parcours terminé ✓" : "Suivant ›";
}

async function gotoScene(i, animate){
  busy=true; awaiting=false; closeMT(); updateControls();
  idx=i; updateBehind(i); updateDots();
  try { await renderScene(i, animate); }
  finally { busy=false; if(!awaiting) fakeBar(); updateControls(); }
}
async function next(){
  if(busy||awaiting||idx>=DATA[jk].scenes.length-1) return;
  await gotoScene(idx+1, true);
}
async function jumpTo(target){
  if(busy||target===idx) return;
  busy=true; awaiting=false; closeMT(); thread.innerHTML=""; pfoot.innerHTML=""; updateControls();
  try {
    for(let k=0;k<target;k++){ await renderScene(k, false); }
    idx=target; updateBehind(target); updateDots();
    await renderScene(target, true);
  } finally { busy=false; if(!awaiting) fakeBar(); updateControls(); }
}
function prev(){ if(!busy && idx>0) jumpTo(idx-1); }

async function startJourney(key){
  jk=key; idx=0; busy=true; awaiting=false; closeMT();
  document.querySelectorAll(".jtab").forEach(t=>t.setAttribute("aria-selected", t.dataset.j===key));
  $("scenario").innerHTML=DATA[key].scenario;
  $("clock").textContent=DATA[key].clock;
  thread.innerHTML=""; pfoot.innerHTML=""; behindBody.innerHTML="";
  buildDots();
  await gotoScene(0, true);
}

/* wiring */
$("nextBtn").onclick=next;
$("prevBtn").onclick=prev;
$("restartBtn").onclick=()=>startJourney(jk);
mtEl.onclick=e=>{ if(e.target===mtEl) closeMT(); };
document.querySelectorAll(".jtab").forEach(t=>t.onclick=()=>startJourney(t.dataset.j));
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ closeMT(); return; }
  if(e.key==="ArrowRight"){ e.preventDefault(); next(); }
  if(e.key==="ArrowLeft"){ e.preventDefault(); prev(); }
});

startJourney("j1");
</script>
